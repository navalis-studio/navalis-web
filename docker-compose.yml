services:
  frontend:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        VITE_API_URL: ${VITE_API_URL:-http://localhost:5000/api}
        VITE_WS_URL: ${VITE_WS_URL:-ws://localhost:5000/ws}
    container_name: navalis-frontend
    restart: unless-stopped
    ports:
      - "80:80"
