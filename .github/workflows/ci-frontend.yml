name: CI - Frontend

on:
  push:
    branches: [main, develop]
    paths:
      - "src/**"
      - "package.json"
      - "bun.lock"
      - "Dockerfile"
      - ".github/workflows/ci-frontend.yml"
  pull_request:
    branches: [main]
    paths:
      - "src/**"
      - "package.json"

jobs:
  lint-and-build:
    name: Lint & Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Configurar Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Instalar dependências
        run: bun install --frozen-lockfile

      - name: Rodar lint
        run: bun run lint -- --max-warnings 15

      - name: Build da aplicação
        env:
          VITE_API_URL: http://localhost:5000/api
          VITE_WS_URL: ws://localhost:5000/ws
        run: bun run build

      - name: Upload do build como artefato
        uses: actions/upload-artifact@v4
        with:
          name: navalis-frontend-dist
          path: dist/
          retention-days: 7

  docker:
    name: Build Docker Image
    runs-on: ubuntu-latest
    needs: lint-and-build

    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Build da imagem Docker
        run: |
          docker build \
            --build-arg VITE_API_URL=http://localhost:5000/api \
            --build-arg VITE_WS_URL=ws://localhost:5000/ws \
            -t navalis-frontend:${{ github.sha }} .

      - name: Verificar imagem
        run: docker images navalis-frontend
